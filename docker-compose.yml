version: '3.8'

services:
  pilot-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: frappe-pilot-sandbox:latest
    container_name: frappe_pilot_app
    # Privileged modes are mandatory for systemd socket manipulation hooks
    privileged: true
    volumes:
      - pilot_data:/home/frappe
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ports:
      - "8002:8002"
      - "7000:7000"
    restart: always

volumes:
  pilot_data:
