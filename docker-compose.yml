services:

  pilot:

    build:
      context: .

    container_name: frappe-pilot

    restart: unless-stopped


    privileged: true


    ports:

      - "2222:22"

      - "7000:7000"


    environment:

      DOMAIN: ${DOMAIN}

      TZ: ${TZ}


    volumes:

      - /var/run/docker.sock:/var/run/docker.sock

      - pilot-data:/opt



volumes:

  pilot-data:
