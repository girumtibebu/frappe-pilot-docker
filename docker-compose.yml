services:

  pilot:
    build: .

    container_name: frappe-pilot

    restart: unless-stopped

    privileged: true

    ports:
      - "7000:7000"

    environment:
      DOMAIN: ${DOMAIN}
      PILOT_ENV: ${PILOT_ENV}
      TZ: ${TZ}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pilot-data:/opt/pilot

volumes:
  pilot-data:
